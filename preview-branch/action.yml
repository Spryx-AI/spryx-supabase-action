name: 'Spryx Supabase Preview Branch'
description: 'Create or delete ephemeral Supabase preview branches for PR environments'
author: 'Spryx'

inputs:
  action:
    description: 'Lifecycle action: create or delete'
    required: true
  project_ref:
    description: 'Supabase project reference ID'
    required: true
  branch_name:
    description: 'Branch name (e.g. pr-123). Must be unique per project.'
    required: true
  supabase_access_token:
    description: 'Supabase access token for Management API authentication'
    required: true
  wait_timeout:
    description: 'Seconds to wait for branch to become ready (create only)'
    required: false
    default: '120'
  write_summary:
    description: 'Write a job summary to GITHUB_STEP_SUMMARY'
    required: false
    default: 'true'
  include_seed:
    description: 'Run seed files after branch creation via supabase db push --include-seed'
    required: false
    default: 'false'
  working_directory:
    description: 'Directory containing the supabase/ folder (required when include_seed is true)'
    required: false
    default: '.'

outputs:
  status:
    description: 'Execution status: success or failure'
    value: ${{ steps.run.outputs.status }}
  branch_id:
    description: 'Supabase branch ID'
    value: ${{ steps.run.outputs.branch_id }}
  branch_name:
    description: 'Resolved branch name used'
    value: ${{ steps.run.outputs.branch_name }}
  db_url:
    description: 'PostgreSQL connection string for the branch (masked)'
    value: ${{ steps.run.outputs.db_url }}
  supabase_url:
    description: 'Supabase API URL for the branch'
    value: ${{ steps.run.outputs.supabase_url }}
  anon_key:
    description: 'Supabase anonymous key for the branch'
    value: ${{ steps.run.outputs.anon_key }}
  service_role_key:
    description: 'Supabase service role key for the branch (masked)'
    value: ${{ steps.run.outputs.service_role_key }}
  summary_markdown:
    description: 'Markdown content written to job summary'
    value: ${{ steps.run.outputs.summary_markdown }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    - id: run
      name: Preview Branch
      shell: bash
      env:
        INPUT_ACTION: ${{ inputs.action }}
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        INPUT_BRANCH_NAME: ${{ inputs.branch_name }}
        INPUT_SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        INPUT_WAIT_TIMEOUT: ${{ inputs.wait_timeout }}
        INPUT_WRITE_SUMMARY: ${{ inputs.write_summary }}
        INPUT_INCLUDE_SEED: ${{ inputs.include_seed }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
      run: node "${{ github.action_path }}/../dist/preview-branch.js"

branding:
  icon: 'git-branch'
  color: 'green'
