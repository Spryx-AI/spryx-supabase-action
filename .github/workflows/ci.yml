name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  summary:
    runs-on: ubuntu-latest
    if: always()
    needs: [commitlint, typecheck, lint, format, test]
    steps:
      - name: Write job summary
        env:
          RESULT_COMMITLINT: ${{ needs.commitlint.result }}
          RESULT_TYPECHECK: ${{ needs.typecheck.result }}
          RESULT_LINT: ${{ needs.lint.result }}
          RESULT_FORMAT: ${{ needs.format.result }}
          RESULT_TEST: ${{ needs.test.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          function status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏸️" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          COMMITLINT=$(status_icon "$RESULT_COMMITLINT")
          TYPECHECK=$(status_icon "$RESULT_TYPECHECK")
          LINT=$(status_icon "$RESULT_LINT")
          FORMAT=$(status_icon "$RESULT_FORMAT")
          TEST=$(status_icon "$RESULT_TEST")

          ALL_PASSED=$([[ "$RESULT_COMMITLINT" == "success" && \
                         "$RESULT_TYPECHECK" == "success" && \
                         "$RESULT_LINT" == "success" && \
                         "$RESULT_FORMAT" == "success" && \
                         "$RESULT_TEST" == "success" ]] && echo "true" || echo "false")

          if [[ "$ALL_PASSED" == "true" ]]; then
            OVERALL="✅ All checks passed"
          else
            OVERALL="❌ Some checks failed"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## CI Summary — OVERALL_PLACEHOLDER

          | Check | Result |
          |---|---|
          | Commitlint | COMMITLINT_PLACEHOLDER |
          | Typecheck | TYPECHECK_PLACEHOLDER |
          | Lint | LINT_PLACEHOLDER |
          | Format | FORMAT_PLACEHOLDER |
          | Test | TEST_PLACEHOLDER |

          **PR:** #PR_NUMBER_PLACEHOLDER — PR_TITLE_PLACEHOLDER
          **Branch:** `HEAD_REF_PLACEHOLDER` → `BASE_REF_PLACEHOLDER`
          **Commit:** `HEAD_SHA_PLACEHOLDER`
          EOF

          sed -i \
            -e "s|OVERALL_PLACEHOLDER|$OVERALL|" \
            -e "s|COMMITLINT_PLACEHOLDER|$COMMITLINT $RESULT_COMMITLINT|" \
            -e "s|TYPECHECK_PLACEHOLDER|$TYPECHECK $RESULT_TYPECHECK|" \
            -e "s|LINT_PLACEHOLDER|$LINT $RESULT_LINT|" \
            -e "s|FORMAT_PLACEHOLDER|$FORMAT $RESULT_FORMAT|" \
            -e "s|TEST_PLACEHOLDER|$TEST $RESULT_TEST|" \
            -e "s|PR_NUMBER_PLACEHOLDER|$PR_NUMBER|" \
            -e "s|PR_TITLE_PLACEHOLDER|$PR_TITLE|" \
            -e "s|HEAD_REF_PLACEHOLDER|$HEAD_REF|" \
            -e "s|BASE_REF_PLACEHOLDER|$BASE_REF|" \
            -e "s|HEAD_SHA_PLACEHOLDER|$HEAD_SHA|" \
            "$GITHUB_STEP_SUMMARY"
