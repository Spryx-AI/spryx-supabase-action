name: 'Spryx Supabase Deploy'
description: 'Apply migrations to a Supabase project via supabase db push'
author: 'Spryx'

inputs:
  project_ref:
    description: 'Supabase project reference ID'
    required: true
  supabase_access_token:
    description: 'Supabase access token for CLI authentication'
    required: true
  working_directory:
    description: 'Directory containing the supabase/ folder'
    required: false
    default: '.'
  write_summary:
    description: 'Write a job summary to GITHUB_STEP_SUMMARY'
    required: false
    default: 'true'
  include_seed:
    description: 'Include seed data after pushing migrations (passes --include-seed to supabase db push)'
    required: false
    default: 'false'

outputs:
  status:
    description: 'Execution status: success or failure'
    value: ${{ steps.run.outputs.status }}
  executed_db_push:
    description: 'Whether migrations were applied (true/false)'
    value: ${{ steps.run.outputs.executed_db_push }}
  summary_markdown:
    description: 'The markdown content written to the job summary'
    value: ${{ steps.run.outputs.summary_markdown }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: latest
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    - id: run
      name: Deploy
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        INPUT_SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
        INPUT_WRITE_SUMMARY: ${{ inputs.write_summary }}
        INPUT_INCLUDE_SEED: ${{ inputs.include_seed }}
      run: node "${{ github.action_path }}/../dist/deploy.js"

branding:
  icon: 'database'
  color: 'green'
